<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSM Visualizer</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #43d17a;
      --text: #e2e4ef;
      --muted: #7b7f9a;
      --radius: 8px;
      --font: 'Inter', system-ui, sans-serif;
    }

    html, body, #root {
      height: 100vh;
      overflow: hidden;
    }

    body, #root {
      display: flex;
      flex-direction: column;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.01em; }
    header p { font-size: 0.8rem; color: var(--muted); }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: var(--surface);
    }

    .panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

    input[type="text"], select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.82rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    .row { display: flex; gap: 6px; align-items: center; }
    .row input, .row select { flex: 1; min-width: 0; }

    btn, .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .btn-danger { background: transparent; color: var(--accent2); border: 1px solid transparent; padding: 4px 8px; font-size: 0.75rem; }
    .btn-danger:hover { border-color: var(--accent2); }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: default;
    }
    .tag.start { border-color: var(--green); color: var(--green); }
    .tag.accept { border-color: var(--accent); color: var(--accent); }
    .tag.both { border-color: var(--accent2); color: var(--accent2); }
    .tag button { background: none; border: none; color: inherit; cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 0; opacity: 0.7; }
    .tag button:hover { opacity: 1; }

    .transition-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 5px 8px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .transition-row .arrow { color: var(--muted); font-size: 0.9rem; }
    .sym { font-family: monospace; background: var(--border); padding: 1px 6px; border-radius: 4px; font-size: 0.78rem; }

    .canvas-area {
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    svg.graph {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    svg.graph:active { cursor: grabbing; }

    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bottom-bar input { max-width: 280px; font-family: monospace; }

    .status-pill {
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .status-pill.idle { background: var(--surface2); color: var(--muted); }
    .status-pill.running { background: #1e2d4a; color: #5aadff; }
    .status-pill.accept { background: #1a3329; color: var(--green); }
    .status-pill.reject { background: #2e1a1f; color: var(--accent2); }

    .tape {
      display: flex;
      gap: 3px;
      align-items: center;
      font-family: monospace;
      font-size: 0.9rem;
    }
    .tape-cell {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface2);
      transition: background 0.15s, border-color 0.15s;
    }
    .tape-cell.current {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tape-cell.consumed {
      opacity: 0.4;
    }

    .empty-hint {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
      padding: 24px 0;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .checkbox-row input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 700;
    }

    .example-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── helpers ──────────────────────────────────────────────────────────────────

function uid() { return Math.random().toString(36).slice(2, 8); }

const EXAMPLES = {
  "Pick & place arm": {
    hint: "Try: go go go go go go go  —or abort early: go go abort",
    states: [
      { id: "idle",     label: "Idle",     start: true,  accept: true  },
      { id: "approach", label: "Approach", start: false, accept: false },
      { id: "grasp",    label: "Grasp",    start: false, accept: false },
      { id: "lift",     label: "Lift",     start: false, accept: false },
      { id: "carry",    label: "Carry",    start: false, accept: false },
      { id: "lower",    label: "Lower",    start: false, accept: false },
      { id: "release",  label: "Release",  start: false, accept: true  },
    ],
    transitions: [
      { id: uid(), from: "idle",     symbol: "go",    to: "approach" },
      { id: uid(), from: "approach", symbol: "go",    to: "grasp"    },
      { id: uid(), from: "approach", symbol: "abort", to: "idle"     },
      { id: uid(), from: "grasp",    symbol: "go",    to: "lift"     },
      { id: uid(), from: "grasp",    symbol: "abort", to: "idle"     },
      { id: uid(), from: "lift",     symbol: "go",    to: "carry"    },
      { id: uid(), from: "carry",    symbol: "go",    to: "lower"    },
      { id: uid(), from: "carry",    symbol: "abort", to: "idle"     },
      { id: uid(), from: "lower",    symbol: "go",    to: "release"  },
      { id: uid(), from: "release",  symbol: "go",    to: "idle"     },
    ],
  },
  "Obstacle avoidance": {
    hint: "Try: clear hit left clear  —or: clear hit right clear",
    states: [
      { id: "drive",   label: "Drive",    start: true,  accept: true  },
      { id: "stop",    label: "Stopped",  start: false, accept: false },
      { id: "turnL",   label: "TurnLeft", start: false, accept: false },
      { id: "turnR",   label: "TurnRight",start: false, accept: false },
      { id: "reverse", label: "Reverse",  start: false, accept: false },
    ],
    transitions: [
      { id: uid(), from: "drive",   symbol: "clear",   to: "drive"   },
      { id: uid(), from: "drive",   symbol: "hit",     to: "stop"    },
      { id: uid(), from: "stop",    symbol: "left",    to: "turnL"   },
      { id: uid(), from: "stop",    symbol: "right",   to: "turnR"   },
      { id: uid(), from: "stop",    symbol: "blocked", to: "reverse" },
      { id: uid(), from: "turnL",   symbol: "clear",   to: "drive"   },
      { id: uid(), from: "turnR",   symbol: "clear",   to: "drive"   },
      { id: uid(), from: "reverse", symbol: "clear",   to: "stop"    },
    ],
  },
  "Block sorting": {
    hint: "Try: scan red place scan blue place scan red place",
    states: [
      { id: "idle",   label: "Idle",      start: true,  accept: true  },
      { id: "scan",   label: "Scanning",  start: false, accept: false },
      { id: "red",    label: "RedSeen",   start: false, accept: false },
      { id: "blue",   label: "BlueSeen",  start: false, accept: false },
      { id: "placed", label: "Placed",    start: false, accept: true  },
      { id: "error",  label: "Error",     start: false, accept: false },
    ],
    transitions: [
      { id: uid(), from: "idle",   symbol: "scan",  to: "scan"   },
      { id: uid(), from: "scan",   symbol: "red",   to: "red"    },
      { id: uid(), from: "scan",   symbol: "blue",  to: "blue"   },
      { id: uid(), from: "scan",   symbol: "empty", to: "idle"   },
      { id: uid(), from: "red",    symbol: "place", to: "placed" },
      { id: uid(), from: "blue",   symbol: "place", to: "placed" },
      { id: uid(), from: "red",    symbol: "drop",  to: "error"  },
      { id: uid(), from: "blue",   symbol: "drop",  to: "error"  },
      { id: uid(), from: "placed", symbol: "scan",  to: "scan"   },
      { id: uid(), from: "error",  symbol: "reset", to: "idle"   },
    ],
  },
  "Binary even zeros": {
    states: [
      { id: "q0", label: "q0", start: true, accept: true },
      { id: "q1", label: "q1", start: false, accept: false },
    ],
    transitions: [
      { id: uid(), from: "q0", symbol: "0", to: "q1" },
      { id: uid(), from: "q0", symbol: "1", to: "q0" },
      { id: uid(), from: "q1", symbol: "0", to: "q0" },
      { id: uid(), from: "q1", symbol: "1", to: "q1" },
    ],
  },
  "Ends with 'ab'": {
    states: [
      { id: "s0", label: "s0", start: true, accept: false },
      { id: "s1", label: "s1", start: false, accept: false },
      { id: "s2", label: "s2", start: false, accept: true },
    ],
    transitions: [
      { id: uid(), from: "s0", symbol: "a", to: "s1" },
      { id: uid(), from: "s0", symbol: "b", to: "s0" },
      { id: uid(), from: "s1", symbol: "a", to: "s1" },
      { id: uid(), from: "s1", symbol: "b", to: "s2" },
      { id: uid(), from: "s2", symbol: "a", to: "s1" },
      { id: uid(), from: "s2", symbol: "b", to: "s0" },
    ],
  },
};

function tokenize(input, transitions) {
  const multiChar = transitions.some(t => t.symbol.length > 1);
  return multiChar ? input.trim().split(/\s+/).filter(Boolean) : input.split("");
}

function simulate(states, transitions, input) {
  const start = states.find(s => s.start);
  if (!start) return null;
  const tokens = tokenize(input, transitions);
  const steps = [{ stateId: start.id, index: 0 }];
  let cur = start.id;
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    const t = transitions.find(t => t.from === cur && t.symbol === tok);
    if (!t) { steps.push({ stateId: null, index: i + 1, dead: true, token: tok }); break; }
    cur = t.to;
    steps.push({ stateId: cur, index: i + 1 });
  }
  return { steps, tokens };
}

// ── Graph layout (circular) ───────────────────────────────────────────────────

function layoutStates(states, cx, cy, r) {
  if (states.length === 0) return {};
  const positions = {};
  if (states.length === 1) {
    positions[states[0].id] = { x: cx, y: cy };
    return positions;
  }
  states.forEach((s, i) => {
    const angle = (2 * Math.PI * i) / states.length - Math.PI / 2;
    positions[s.id] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  });
  return positions;
}

// ── SVG Graph ────────────────────────────────────────────────────────────────

const NODE_R = 30;

function GraphView({ states, transitions, currentStateId, deadState }) {
  const svgRef = useRef(null);
  const [viewBox, setViewBox] = useState({ x: 0, y: 0, w: 800, h: 500 });
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    const ro = new ResizeObserver(([e]) => {
      setViewBox(v => ({ ...v, w: e.contentRect.width, h: e.contentRect.height }));
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  const cx = viewBox.w / 2;
  const cy = viewBox.h / 2;
  const r = Math.min(viewBox.w, viewBox.h) * 0.32;
  const positions = useMemo(
    () => layoutStates(states, cx, cy, r),
    [states, cx, cy, r]
  );

  // pan
  const onMouseDown = e => { setDragging(true); dragStart.current = { x: e.clientX, y: e.clientY, vb: { ...viewBox } }; };
  const onMouseMove = e => {
    if (!dragging || !dragStart.current) return;
    const dx = (e.clientX - dragStart.current.x);
    const dy = (e.clientY - dragStart.current.y);
    setViewBox(v => ({ ...dragStart.current.vb, w: v.w, h: v.h, x: dragStart.current.vb.x - dx, y: dragStart.current.vb.y - dy }));
  };
  const onMouseUp = () => setDragging(false);

  // group transitions by (from,to) pair for curved parallel edges
  const edgeGroups = useMemo(() => {
    const groups = {};
    transitions.forEach(t => {
      const key = [t.from, t.to].sort().join("||");
      if (!groups[key]) groups[key] = [];
      groups[key].push(t);
    });
    return groups;
  }, [transitions]);

  function edgePath(t, index, total) {
    const p1 = positions[t.from];
    const p2 = positions[t.to];
    if (!p1 || !p2) return null;

    if (t.from === t.to) {
      // self-loop
      const lx = p1.x;
      const ly = p1.y - NODE_R;
      return `M ${lx - 10} ${ly} C ${lx - 40} ${ly - 50} ${lx + 40} ${ly - 50} ${lx + 10} ${ly}`;
    }

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / len;
    const ny = dx / len;

    // offset for parallel edges
    const offset = total > 1 ? (index - (total - 1) / 2) * 28 : 0;
    const mx = (p1.x + p2.x) / 2 + nx * offset;
    const my = (p1.y + p2.y) / 2 + ny * offset;

    // shorten to node radius
    const startX = p1.x + (dx / len) * NODE_R;
    const startY = p1.y + (dy / len) * NODE_R;
    const endX = p2.x - (dx / len) * NODE_R;
    const endY = p2.y - (dy / len) * NODE_R;

    if (total === 1) {
      return `M ${startX} ${startY} L ${endX} ${endY}`;
    }
    return `M ${startX} ${startY} Q ${mx} ${my} ${endX} ${endY}`;
  }

  function labelPoint(t, index, total) {
    const p1 = positions[t.from];
    const p2 = positions[t.to];
    if (!p1 || !p2) return null;

    if (t.from === t.to) return { x: p1.x, y: p1.y - NODE_R - 36 };

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / len;
    const ny = dx / len;
    const offset = total > 1 ? (index - (total - 1) / 2) * 28 : 0;
    return {
      x: (p1.x + p2.x) / 2 + nx * (offset + 14),
      y: (p1.y + p2.y) / 2 + ny * (offset + 14),
    };
  }

  const renderedEdges = [];
  Object.values(edgeGroups).forEach(group => {
    group.forEach((t, idx) => {
      const d = edgePath(t, idx, group.length);
      const lp = labelPoint(t, idx, group.length);
      if (!d || !lp) return;
      renderedEdges.push({ t, d, lp, idx, total: group.length });
    });
  });

  return (
    <svg
      ref={svgRef}
      className="graph"
      viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
    >
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#7b7f9a" />
        </marker>
        <marker id="arrow-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#6c63ff" />
        </marker>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>

      {/* edges */}
      {renderedEdges.map(({ t, d, lp }) => {
        const isActive = t.from === currentStateId;
        return (
          <g key={t.id}>
            <path
              d={d}
              fill="none"
              stroke={isActive ? "#6c63ff" : "#2e3347"}
              strokeWidth={isActive ? 2 : 1.5}
              markerEnd={isActive ? "url(#arrow-active)" : "url(#arrow)"}
              strokeDasharray={isActive ? "none" : "none"}
            />
            <text
              x={lp.x} y={lp.y}
              textAnchor="middle"
              dominantBaseline="middle"
              fontSize="11"
              fontFamily="monospace"
              fill={isActive ? "#a89fff" : "#7b7f9a"}
              style={{ userSelect: "none" }}
            >
              {t.symbol}
            </text>
          </g>
        );
      })}

      {/* nodes */}
      {states.map(s => {
        const pos = positions[s.id];
        if (!pos) return null;
        const isCurrent = s.id === currentStateId;
        const isDead = deadState && isCurrent;
        const color = isDead ? "#ff6584" : isCurrent ? "#6c63ff" : s.accept ? "#252836" : "#1a1d27";
        const stroke = isDead ? "#ff6584" : isCurrent ? "#6c63ff" : s.accept ? "#6c63ff" : "#2e3347";
        return (
          <g key={s.id} transform={`translate(${pos.x},${pos.y})`}>
            {isCurrent && (
              <circle r={NODE_R + 6} fill={isDead ? "#ff658420" : "#6c63ff20"} filter="url(#glow)" />
            )}
            {s.start && (
              <polygon
                points={`${-NODE_R - 22},0 ${-NODE_R - 8},-8 ${-NODE_R - 8},8`}
                fill="#43d17a"
              />
            )}
            <circle r={NODE_R} fill={color} stroke={stroke} strokeWidth={isCurrent ? 2.5 : 1.5} />
            {s.accept && (
              <circle r={NODE_R - 5} fill="none" stroke={stroke} strokeWidth={1.5} />
            )}
            <text
              textAnchor="middle"
              dominantBaseline="middle"
              fontSize="13"
              fontWeight="600"
              fill={isCurrent ? "#fff" : "#e2e4ef"}
              style={{ userSelect: "none" }}
            >
              {s.label}
            </text>
          </g>
        );
      })}

      {states.length === 0 && (
        <text x={cx} y={cy} textAnchor="middle" fill="#7b7f9a" fontSize="14">
          Add states to get started →
        </text>
      )}
    </svg>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [states, setStates] = useState([]);
  const [transitions, setTransitions] = useState([]);

  // add state form
  const [newLabel, setNewLabel] = useState("");
  const [newIsStart, setNewIsStart] = useState(false);
  const [newIsAccept, setNewIsAccept] = useState(false);

  // add transition form
  const [tFrom, setTFrom] = useState("");
  const [tSymbol, setTSymbol] = useState("");
  const [tTo, setTTo] = useState("");

  // simulation
  const [inputStr, setInputStr] = useState("");
  const [simResult, setSimResult] = useState(null); // { steps, tokens }
  const [simIndex, setSimIndex] = useState(0);
  const [activeExample, setActiveExample] = useState(null);

  const simSteps = simResult ? simResult.steps : null;
  const simTokens = simResult ? simResult.tokens : null;
  const currentStep = simSteps ? simSteps[simIndex] : null;
  const currentStateId = currentStep ? currentStep.stateId : null;
  const isDead = currentStep ? !!currentStep.dead : false;
  const simDone = simSteps ? simIndex === simSteps.length - 1 : false;

  const currentState = states.find(s => s.id === currentStateId);
  const accepted = simDone && currentState && currentState.accept && !isDead;
  const rejected = simDone && (!currentState || !currentState.accept || isDead);

  const activeHint = activeExample ? EXAMPLES[activeExample]?.hint : null;

  function addState() {
    const label = newLabel.trim();
    if (!label) return;
    if (states.some(s => s.label === label)) return;
    const isFirst = states.length === 0;
    setStates(prev => [...prev, {
      id: uid(),
      label,
      start: newIsStart || isFirst,
      accept: newIsAccept,
    }]);
    setNewLabel("");
    setNewIsStart(false);
    setNewIsAccept(false);
    resetSim();
  }

  function removeState(id) {
    setStates(prev => prev.filter(s => s.id !== id));
    setTransitions(prev => prev.filter(t => t.from !== id && t.to !== id));
    resetSim();
  }

  function addTransition() {
    if (!tFrom || !tTo || !tSymbol.trim()) return;
    // check for duplicate
    if (transitions.some(t => t.from === tFrom && t.symbol === tSymbol.trim() && t.to === tTo)) return;
    setTransitions(prev => [...prev, { id: uid(), from: tFrom, symbol: tSymbol.trim(), to: tTo }]);
    setTSymbol("");
    resetSim();
  }

  function removeTransition(id) {
    setTransitions(prev => prev.filter(t => t.id !== id));
    resetSim();
  }

  function resetSim() {
    setSimResult(null);
    setSimIndex(0);
  }

  function runSim() {
    const result = simulate(states, transitions, inputStr);
    setSimResult(result);
    setSimIndex(0);
  }

  function stepForward() {
    if (simSteps && simIndex < simSteps.length - 1) setSimIndex(i => i + 1);
  }

  function stepBack() {
    if (simSteps && simIndex > 0) setSimIndex(i => i - 1);
  }

  function loadExample(name) {
    const ex = EXAMPLES[name];
    setStates(ex.states);
    setTransitions(ex.transitions.map(t => ({ ...t, id: uid() })));
    setActiveExample(name);
    resetSim();
    setInputStr("");
    setTFrom("");
    setTTo("");
  }

  const statusLabel = () => {
    if (!simSteps) return { cls: "idle", text: "Idle" };
    if (isDead) return { cls: "reject", text: `No transition on "${currentStep.token}" — rejected` };
    if (simDone && accepted) return { cls: "accept", text: "Accepted ✓" };
    if (simDone && rejected) return { cls: "reject", text: "Rejected ✗" };
    return { cls: "running", text: `Step ${simIndex} / ${simSteps.length - 1}` };
  };
  const status = statusLabel();

  const stateOptions = states.map(s => <option key={s.id} value={s.id}>{s.label}</option>);

  return (
    <>
      <header>
        <div>
          <h1>FSM Visualizer</h1>
          <p>Define and simulate Deterministic Finite Automata</p>
        </div>
        <span className="badge">DFA</span>
      </header>

      <div className="layout">
        {/* ── Sidebar ── */}
        <div className="sidebar">

          {/* Examples */}
          <div className="panel">
            <div className="panel-header">Examples</div>
            <div className="panel-body">
              <div className="example-btns">
                {Object.keys(EXAMPLES).map(name => (
                  <button key={name} className="btn btn-ghost btn-sm" onClick={() => loadExample(name)}>{name}</button>
                ))}
              </div>
            </div>
          </div>

          {/* States */}
          <div className="panel">
            <div className="panel-header">
              <span>States</span>
              <span style={{ color: "#e2e4ef", fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>{states.length}</span>
            </div>
            <div className="panel-body">
              <input
                type="text"
                placeholder="State name (e.g. q0)"
                value={newLabel}
                onChange={e => setNewLabel(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addState()}
              />
              <div className="row" style={{ gap: 12, padding: "2px 0" }}>
                <label className="checkbox-row">
                  <input type="checkbox" checked={newIsStart} onChange={e => setNewIsStart(e.target.checked)} />
                  Start
                </label>
                <label className="checkbox-row">
                  <input type="checkbox" checked={newIsAccept} onChange={e => setNewIsAccept(e.target.checked)} />
                  Accept
                </label>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addState}>Add State</button>
              {states.length > 0 && (
                <div className="tag-list" style={{ marginTop: 4 }}>
                  {states.map(s => {
                    const cls = s.start && s.accept ? "both" : s.start ? "start" : s.accept ? "accept" : "";
                    return (
                      <span key={s.id} className={`tag ${cls}`}>
                        {s.start && "→ "}{s.label}{s.accept && " *"}
                        <button onClick={() => removeState(s.id)}>×</button>
                      </span>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Transitions */}
          <div className="panel">
            <div className="panel-header">
              <span>Transitions</span>
              <span style={{ color: "#e2e4ef", fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>{transitions.length}</span>
            </div>
            <div className="panel-body">
              <div className="row">
                <select value={tFrom} onChange={e => setTFrom(e.target.value)}>
                  <option value="">From</option>
                  {stateOptions}
                </select>
                <input
                  type="text"
                  placeholder="sym"
                  value={tSymbol}
                  onChange={e => setTSymbol(e.target.value)}
                  style={{ maxWidth: 54 }}
                  onKeyDown={e => e.key === "Enter" && addTransition()}
                />
                <select value={tTo} onChange={e => setTTo(e.target.value)}>
                  <option value="">To</option>
                  {stateOptions}
                </select>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addTransition}>Add Transition</button>
              <div style={{ display: "flex", flexDirection: "column", gap: 5, marginTop: 4 }}>
                {transitions.map(t => {
                  const fromLabel = states.find(s => s.id === t.from)?.label || t.from;
                  const toLabel = states.find(s => s.id === t.to)?.label || t.to;
                  return (
                    <div key={t.id} className="transition-row">
                      <span>{fromLabel}</span>
                      <span className="arrow">→</span>
                      <span className="sym">{t.symbol}</span>
                      <span className="arrow">→</span>
                      <span style={{ flex: 1 }}>{toLabel}</span>
                      <button className="btn btn-danger" onClick={() => removeTransition(t.id)}>×</button>
                    </div>
                  );
                })}
                {transitions.length === 0 && <div className="empty-hint">No transitions yet</div>}
              </div>
            </div>
          </div>
        </div>

        {/* ── Canvas ── */}
        <div className="canvas-area">
          <GraphView
            states={states}
            transitions={transitions}
            currentStateId={currentStateId}
            deadState={isDead}
          />

          {/* Bottom control bar */}
          <div className="bottom-bar">
            <input
              type="text"
              placeholder={activeHint ? activeHint : "Input string (e.g. 0110)"}
              value={inputStr}
              onChange={e => { setInputStr(e.target.value); resetSim(); }}
              onKeyDown={e => e.key === "Enter" && runSim()}
              style={{ maxWidth: 320 }}
            />
            <button className="btn btn-primary btn-sm" onClick={runSim} disabled={states.length === 0}>
              Run
            </button>
            <button className="btn btn-ghost btn-sm" onClick={stepBack} disabled={!simSteps || simIndex === 0}>‹ Back</button>
            <button className="btn btn-ghost btn-sm" onClick={stepForward} disabled={!simSteps || simDone}>Next ›</button>
            <button className="btn btn-ghost btn-sm" onClick={resetSim} disabled={!simSteps}>Reset</button>

            {simResult && simTokens && (
              <div className="tape">
                {simTokens.map((tok, i) => (
                  <div
                    key={i}
                    className={`tape-cell${i === simIndex - 1 && !isDead ? " current" : i < simIndex - 1 || (isDead && i < simIndex) ? " consumed" : ""}`}
                    style={{ minWidth: tok.length > 1 ? `${tok.length * 8 + 12}px` : undefined, width: tok.length > 1 ? 'auto' : undefined }}
                  >
                    {tok}
                  </div>
                ))}
              </div>
            )}

            <div style={{ marginLeft: "auto" }}>
              <span className={`status-pill ${status.cls}`}>{status.text}</span>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
